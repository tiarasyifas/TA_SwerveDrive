controller_manager:
  ros__parameters:
    update_rate: 100

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    steering_controller:
      type: position_controllers/JointGroupPositionController

    wheel_controller:
      type: velocity_controllers/JointGroupVelocityController

steering_controller:
  ros__parameters:
    joints:
      - "Revolute 1"
      - "Revolute 2"
      - "Revolute 3"
      - "Revolute 4"

wheel_controller:
  ros__parameters:
    joints:
      - "Revolute 5"
      - "Revolute 6"
      - "Revolute 7"
      - "Revolute 8"